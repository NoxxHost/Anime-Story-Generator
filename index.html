<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Story Generator AI - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --primary-color: #66fcf1;
            --secondary-color: #45f3ff;
            --accent-color: #ff007f;
            --text-color: #c5c6c7;
            --card-bg: #1f2833;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(102, 252, 241, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 30px 15px;
            animation: fadeInDown 1s ease-out;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px var(--primary-color);
        }

        @media (min-width: 768px) { header h1 { font-size: 3rem; } }
        header h1 span { color: var(--primary-color); }
        header p { margin-top: 10px; font-size: 0.9rem; opacity: 0.8; }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 15px 50px;
        }

        .generator-box {
            background: rgba(31, 40, 51, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(102, 252, 241, 0.2);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 1s ease-out;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        @media (min-width: 600px) {
            .form-row { grid-template-columns: 1fr 1fr; }
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: var(--primary-color); font-size: 0.9rem; }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: rgba(11, 12, 16, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.3);
            outline: none;
        }

        select option {
            background: var(--bg-color);
            color: #fff;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: #000;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
        }

        .btn:hover { transform: scale(1.01); box-shadow: 0 0 30px var(--primary-color); }

        .loading {
            display: none;
            text-align: center;
            margin: 30px 0;
            animation: fadeIn 0.3s;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(102, 252, 241, 0.1);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-dragon"></i> AnimeStory<span>AI</span></h1>
        <p>Sistem Generator Novel & Cerita Anime Utuh Ber-Chapter</p>
    </header>

    <div class="container">
        <div class="generator-box">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fa-solid fa-tags"></i> Genre</label>
                    <input type="text" id="genre" placeholder="Contoh: Isekai, Action, Fantasy">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-earth-asia"></i> Latar Kota / Negara</label>
                    <input type="text" id="location" placeholder="Contoh: Tokyo Modern, Kerajaan Elvoria">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fa-solid fa-list-ol"></i> Jumlah Total Chapter</label>
                    <select id="totalChapters">
                        <option value="3">3 Chapter (Pendek)</option>
                        <option value="5">5 Chapter (Sedang)</option>
                        <option value="7">7 Chapter (Panjang)</option>
                        <option value="10">10 Chapter (Sangat Panjang)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-flag-checkered"></i> Akhir Cerita (Ending)</label>
                    <select id="endingStyle">
                        <option value="Happy Ending dan semua konflik tuntas">Happy Ending</option>
                        <option value="Sad Ending yang emosional dan mengharukan">Sad Ending</option>
                        <option value="Plot Twist tidak terduga namun tetap tamat bener-bener end">Plot Twist Ending</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label><i class="fa-solid fa-pen-nib"></i> Sinopsis Dasar / Ide Cerita</label>
                <textarea id="synopsis" rows="4" placeholder="Ceritakan ide dasarmu di sini..."></textarea>
            </div>

            <button class="btn" onclick="generateEpicStory()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Racik & Buka Buku Cerita
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loadingText" style="font-size: 0.95rem; color: var(--primary-color); font-weight: 600;">AI sedang meracik seluruh chapter novelmu... Harap tunggu, ini membutuhkan waktu agak lama karena ceritanya dibuat langsung lengkap tanpa gantung.</p>
        </div>
    </div>

    <script>
        async function generateEpicStory() {
            const genre = document.getElementById('genre').value;
            const location = document.getElementById('location').value;
            const totalChapters = document.getElementById('totalChapters').value;
            const endingStyle = document.getElementById('endingStyle').value;
            const synopsis = document.getElementById('synopsis').value;

            if (!genre || !location || !synopsis) {
                return alert("Harap isi semua kolom input data cerita!");
            }

            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            // Membuat Mega Prompt agar AI langsung memproses sekaligus ber-chapter terstruktur
            const prompt = `Buatkan sebuah cerita anime/light novel yang lengkap, panjang, mendalam, dan selesai sepenuhnya dari awal sampai akhir tanpa menggantung.
            Detail Cerita:
            - Genre: ${genre}
            - Latar Tempat: ${location}
            - Total Target: ${totalChapters} Chapter
            - Jenis Akhir: ${endingStyle}
            - Sinopsis Ide Dasar: ${synopsis}

            Aturan Format Penulisan:
            1. Di baris paling pertama tulis judulnya dengan format -> JUDUL: [Ketik Nama Judul Disini]
            2. Di bawah judul, bagi penulisan cerita secara teratur menggunakan tanda pembatas bab yang jelas seperti ini -> === CHAPTER [Nomor Bab]: [Judul Bab] ===
            3. Pada chapter terakhir (Chapter ${totalChapters}), pastikan alurnya benar-benar tamat (END) secara memuaskan dan tidak menggantung. Setiap babnya harus ditulis panjang dan seru.`;

            try {
                const response = await fetch(`https://api.lexcode.biz.id/api/ai/deepseek-v4-pro?text=${encodeURIComponent(prompt)}`);
                const data = await response.json();
                loading.style.display = 'none';

                const rawStory = data.result || data.reply || data.text || null;

                if (rawStory) {
                    // Menyimpan data hasil ke localStorage browser supaya bisa dioper ke file cerita.html
                    localStorage.setItem("generated_anime_story", rawStory);
                    
                    // Alihkan halaman ke tempat pembacaan novel khusus
                    window.location.href = "cerita.html";
                } else {
                    alert("Gagal meracik cerita. Silakan coba lagi.");
                }

            } catch (error) {
                console.error(error);
                loading.style.display = 'none';
                alert("Terjadi kesalahan koneksi API.");
            }
        }
    </script>
</body>
</html>
