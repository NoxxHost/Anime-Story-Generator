<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Story Generator AI - Fixed Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --primary-color: #66fcf1;
            --secondary-color: #45f3ff;
            --accent-color: #ff007f;
            --text-color: #c5c6c7;
            --card-bg: #1f2833;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(102, 252, 241, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 30px 15px;
            animation: fadeInDown 1s ease-out;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px var(--primary-color);
        }

        @media (min-width: 768px) {
            header h1 { font-size: 3rem; }
        }

        header h1 span { color: var(--primary-color); }
        header p { margin-top: 10px; font-size: 0.9rem; opacity: 0.8; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 15px 50px;
        }

        .generator-box {
            background: rgba(31, 40, 51, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(102, 252, 241, 0.2);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 1s ease-out;
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: var(--primary-color); font-size: 0.9rem; }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(11, 12, 16, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.3);
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: #000;
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
        }

        .btn:hover { transform: scale(1.01); box-shadow: 0 0 30px var(--primary-color); }

        /* Result Section */
        .result-box {
            display: none;
            background: rgba(31, 40, 51, 0.9);
            border-radius: 20px;
            padding: 20px;
            border-top: 4px solid var(--primary-color);
            box-shadow: 0 10px 50px rgba(0,0,0,0.6);
            animation: fadeIn 1s;
        }

        @media (min-width: 768px) {
            .result-box { padding: 35px; }
        }

        .result-header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        @media (min-width: 600px) {
            .result-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        /* Ukuran judul diperkecil agar pas di HP */
        .story-title { 
            color: #fff; 
            font-size: 1.3rem; 
            font-weight: 800;
            line-height: 1.4;
        }
        @media (min-width: 768px) { .story-title { font-size: 1.8rem; } }

        .btn-group { display: flex; gap: 10px; width: 100%; }
        @media (min-width: 600px) { .btn-group { width: auto; } }

        .btn-small {
            flex: 1;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .btn-small:hover { background: var(--primary-color); color: #000; }

        .btn-continue {
            background: linear-gradient(45deg, #ff007f, #8a2be2) !important;
            color: white !important;
            border: none !important;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }

        .btn-continue:hover { box-shadow: 0 0 25px rgba(255, 0, 127, 0.7); }

        /* Area Isi Cerita (Font dioptimalkan agar tidak raksasa) */
        .story-display {
            line-height: 1.7;
            font-size: 0.95rem;
            white-space: pre-wrap; /* Lebih aman dibanding pre-line agar text wrapping di HP sempurna */
            color: #e0e0e0;
            text-align: left;
            word-break: break-word;
        }
        @media (min-width: 768px) {
            .story-display { font-size: 1.05rem; line-height: 1.9; text-align: justify; }
        }

        .chapter-divider {
            margin: 30px 0 15px;
            padding: 12px 15px;
            background: rgba(102, 252, 241, 0.1);
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            color: var(--secondary-color);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 30px 0;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(102, 252, 241, 0.1);
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-dragon"></i> AnimeStory<span>AI</span></h1>
        <p>Sistem AI Menulis Light Novel & Cerita Anime</p>
    </header>

    <div class="container">
        <div class="generator-box">
            <div class="form-group">
                <label><i class="fa-solid fa-tags"></i> Genre</label>
                <input type="text" id="genre" placeholder="Contoh: Action, Romance, Isekai">
            </div>
            
            <div class="form-group">
                <label><i class="fa-solid fa-pen-nib"></i> Sinopsis Dasar</label>
                <textarea id="synopsis" rows="3" placeholder="Ceritakan ide dasar ceritamu di sini..."></textarea>
            </div>

            <button class="btn" onclick="startNewStory()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Buat Cerita Baru
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loadingText" style="font-size: 0.9rem;">AI sedang menulis mahakarya-mu... Mohon tunggu.</p>
        </div>

        <div class="result-box" id="resultBox">
            <div class="result-header">
                <div class="story-title" id="displayTitle">Judul Anime</div>
                <div class="btn-group">
                    <button class="btn-small" onclick="copyFullStory()">
                        <i class="fa-solid fa-copy"></i> Salin
                    </button>
                    <button class="btn-small btn-continue" id="continueBtn" onclick="continueStory()">
                        <i class="fa-solid fa-forward"></i> Lanjutkan
                    </button>
                </div>
            </div>
            
            <div id="storyContainer" class="story-display"></div>
        </div>
    </div>

    <script>
        let currentChapter = 1;
        let storyHistory = ""; 
        let mainTitle = "";

        async function callAI(prompt) {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            try {
                const response = await fetch(`https://api.lexcode.biz.id/api/ai/deepseek-v4-pro?text=${encodeURIComponent(prompt)}`);
                const data = await response.json();
                loading.style.display = 'none';
                return data.result || data.reply || data.text || null;
            } catch (error) {
                console.error(error);
                loading.style.display = 'none';
                alert("Koneksi gagal. Silakan coba lagi.");
                return null;
            }
        }

        async function startNewStory() {
            const genre = document.getElementById('genre').value;
            const synopsis = document.getElementById('synopsis').value;

            if (!genre || !synopsis) return alert("Isi Genre dan Sinopsis!");

            currentChapter = 1;
            storyHistory = "";
            document.getElementById('storyContainer').innerHTML = "";
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('loadingText').innerText = "AI sedang menulis Chapter 1...";

            const prompt = `Buatkan sebuah cerita anime/light novel.
            Genre: ${genre}
            Sinopsis: ${synopsis}
            
            Aturan Output:
            1. Tuliskan usulan judul di baris paling awal dengan format khusus ini -> JUDUL: [Ketik Judul Disini]
            2. Mulai tulis isi cerita Chapter 1 secara naratif, seru, dan panjang di bawahnya.`;

            const result = await callAI(prompt);
            if (result) {
                // Perbaikan Sistem Ekstraksi Judul (Lebih aman jika format meleset)
                if (result.includes("JUDUL:")) {
                    const lines = result.split("\n");
                    const titleLine = lines.find(l => l.includes("JUDUL:"));
                    mainTitle = titleLine.replace("JUDUL:", "").replace(/[\[\]]/g, "").trim();
                    document.getElementById('displayTitle').innerText = mainTitle;
                    
                    const content = result.replace(titleLine, "").trim();
                    addChapterToUI(1, content);
                    storyHistory = content;
                } else {
                    // Cadangan jika AI tidak mematuhi format instruksi judul
                    mainTitle = "Petualangan Utama";
                    document.getElementById('displayTitle').innerText = mainTitle;
                    addChapterToUI(1, result.trim());
                    storyHistory = result.trim();
                }
                
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('resultBox').scrollIntoView({ behavior: 'smooth' });
            }
        }

        async function continueStory() {
            currentChapter++;
            document.getElementById('loadingText').innerText = `AI sedang melanjutkan ke Chapter ${currentChapter}...`;
            document.getElementById('loading').style.display = 'block';
            
            // Mengambil potongan cerita sebelumnya sebagai memori AI
            const lastContext = storyHistory.slice(-2500); 

            const prompt = `Lanjutkan cerita novel/anime berjudul "${mainTitle}".
            Potongan alur cerita terakhir:
            "${lastContext}"
            
            Tugas Anda:
            Tulis kelanjutan cerita langsung untuk masuk ke "Chapter ${currentChapter}". Tulis ceritanya mengalir secara naratif, seru, dan panjang tanpa mengulang kalimat pembuka di awal.`;

            const result = await callAI(prompt);
            if (result) {
                addChapterToUI(currentChapter, result.trim());
                storyHistory += "\n\n" + result.trim(); 
                
                // Scroll otomatis ke posisi chapter baru yang berhasil dimuat
                setTimeout(() => {
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 300);
            }
        }

        function addChapterToUI(num, text) {
            const container = document.getElementById('storyContainer');
            
            const chapterDiv = document.createElement('div');
            chapterDiv.className = "chapter-divider";
            chapterDiv.innerHTML = `<i class="fa-solid fa-bookmark"></i> CHAPTER ${num}`;
            
            const textDiv = document.createElement('div');
            textDiv.innerText = text;

            container.appendChild(chapterDiv);
            container.appendChild(textDiv);
        }

        function copyFullStory() {
            const title = document.getElementById('displayTitle').innerText;
            const content = document.getElementById('storyContainer').innerText;
            const fullText = `${title}\n\n${content}`;

            // Sistem Copy cadangan jika navigator.clipboard tidak didukung browser tertentu
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(fullText).then(() => {
                    alert("Cerita berhasil disalin ke clipboard!");
                }).catch(() => {
                    fallbackCopy(fullText);
                });
            } else {
                fallbackCopy(fullText);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                alert("Cerita berhasil disalin!");
            } catch (err) {
                alert("Gagal menyalin teks, silakan blok manual.");
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
