<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryForge AI - Chat Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #06070d;
            --panel-bg: rgba(11, 14, 28, 0.95);
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff007f;
            --text-main: #def2f1;
            --chat-user: #1f2833;
            --chat-ai: rgba(0, 243, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.01) 1px, transparent 1px);
            background-size: 40px 40px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            background: rgba(15, 18, 36, 0.9);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .novel-info h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(0,243,255,0.3);
        }

        .btn-header {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-header:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }

        /* Chat Container Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        /* Bubble Chat Styles */
        .chat-bubble {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 14px;
            line-height: 1.8;
            font-size: 0.95rem;
            white-space: pre-wrap;
            position: relative;
            animation: fadeInUp 0.4s ease-out forwards;
        }

        .user-bubble {
            background: var(--chat-user);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ai-bubble {
            background: var(--chat-ai);
            color: #d1d5db;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(0, 243, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.02);
        }

        .bubble-meta {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
            letter-spacing: 1px;
        }
        .user-bubble .bubble-meta { color: var(--neon-magenta); }
        .ai-bubble .bubble-meta { color: var(--neon-cyan); }

        /* Floating Copy Button inside AI bubble */
        .inner-copy-btn {
            margin-top: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .inner-copy-btn:hover { background: rgba(0,243,255,0.1); color: var(--neon-cyan); border-color: var(--neon-cyan); }

        /* Loading Indicator inside Chat */
        .ai-loading-bubble {
            display: none;
            align-self: flex-start;
            background: rgba(255, 0, 127, 0.05);
            border: 1px solid rgba(255, 0, 127, 0.2);
            padding: 12px 20px;
            border-radius: 14px;
            border-bottom-left-radius: 2px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--neon-magenta);
            animation: pulse 1.5s infinite ease-in-out;
        }

        /* Input Bottom Bar */
        .input-bar {
            background: rgba(11, 14, 28, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 15px 20px;
            backdrop-filter: blur(10px);
        }

        .input-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        .input-container input {
            flex: 1;
            background: #000;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 18px;
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        .input-container input:focus {
            border-color: var(--neon-cyan);
            outline: none;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .send-btn {
            background: linear-gradient(45deg, var(--neon-cyan), #00a8ff);
            border: none;
            color: #000;
            width: 50px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }
        .send-btn:hover { transform: scale(1.03); box-shadow: 0 0 25px var(--neon-cyan); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="btn-header"><i class="fa-solid fa-arrow-left"></i> Reset Engine</a>
        <div class="novel-info">
            <h2 id="novelTitle">AI Chat Core</h2>
        </div>
        <div style="width: 85px;"></div> </div>

    <div class="chat-container" id="chatContainer">
        </div>

    <div class="chat-container" style="flex: none; padding-top: 0; padding-bottom: 0;">
        <div class="ai-loading-bubble" id="aiLoading">
            <i class="fa-solid fa-gear fa-spin"></i> CORE_AI SEDANG MERACIK LANJUTAN ALUR...
        </div>
    </div>

    <div class="input-bar">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Ketik 'lanjutkan' atau instruksi custom alur bab berikutnya..." onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendPrompt()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let currentChapter = 1;
        let lastContextText = "";

        document.addEventListener("DOMContentLoaded", () => {
            const title = localStorage.getItem("cyber_title") || "Epic Novel Matrix";
            currentChapter = parseInt(localStorage.getItem("cyber_chap_num")) || 1;
            const textContent = localStorage.getItem("cyber_text") || "No data initialized.";

            document.getElementById('novelTitle').innerText = title;
            lastContextText = textContent;

            // Render bubble Chapter 1 pertama kali
            appendChatBubble(`Chapter ${currentChapter}`, textContent, 'ai');
        });

        function appendChatBubble(senderLabel, text, type) {
            const container = document.getElementById('chatContainer');
            const bubble = document.createElement('div');
            bubble.className = `chat-bubble ${type}-bubble`;

            let innerHTML = `<span class="bubble-meta">${senderLabel.toUpperCase()}</span>`;
            innerHTML += `<div>${text}</div>`;

            if (type === 'ai') {
                innerHTML += `<br><button class="inner-copy-btn" onclick="copyBubbleText(this)"><i class="fa-solid fa-copy"></i> Salin Bab Ini</button>`;
            }

            bubble.innerHTML = innerHTML;
            container.appendChild(bubble);
            
            // Scroll otomatis ke bagian pesan paling bawah
            container.scrollTop = container.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendPrompt();
            }
        }

        async function sendPrompt() {
            const inputField = document.getElementById('userInput');
            const userText = inputField.value.trim();
            if (!userText) return;

            // Tampilkan pesan pengguna di dalam chat
            appendChatBubble("YOU (User)", userText, "user");
            inputField.value = ""; // Reset input field

            const loadingBubble = document.getElementById('aiLoading');
            loadingBubble.style.display = 'block';
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;

            const nextChapter = currentChapter + 1;
            
            // Mengambil potongan bagian akhir teks saja untuk menjaga kestabilan parameter URL GET API
            const safeSnippet = lastContextText.slice(-800);

            const charConfig = localStorage.getItem("cyber_char_config") || "";
            const genre = localStorage.getItem("cyber_genre") || "";
            const loc = localStorage.getItem("cyber_location") || "";
            const title = localStorage.getItem("cyber_title") || "";

            // Custom prompt dinamis: AI akan membaca instruksi dari teks yang baru saja diketik pengguna
            const prompt = `Lanjutkan novel berjudul "${title}" ke Chapter ${nextChapter}.
            Genre: ${genre} | Latar: ${loc}
            Data Karakter: ${charConfig}
            Konteks Bab Sebelumnya: "${safeSnippet}"
            Perintah Modifikasi Tambahan dari Pembaca: "${userText}"

            Tugas: Buat kelanjutan cerita eksklusif langsung terfokus masuk ke "Chapter ${nextChapter}". Tulislah dengan gaya bahasa naratif yang sangat seru, panjang, mengalir, dan mendalam sesuai instruksi baru pengguna.`;

            try {
                const response = await fetch(`https://api.lexcode.biz.id/api/ai/deepseek-v4-pro?text=${encodeURIComponent(prompt)}`);
                const data = await response.json();
                loadingBubble.style.display = 'none';

                const resText = data.result || data.reply || data.text || null;

                if (resText) {
                    currentChapter = nextChapter;
                    lastContextText = resText.trim();
                    
                    // Render bubble chat balasan dari AI tanpa menghapus pesan sebelumnya
                    appendChatBubble(`Chapter ${currentChapter}`, lastContextText, 'ai');
                } else {
                    alert("Gagal memproses alur chat dari AI Core.");
                }
            } catch (error) {
                loadingBubble.style.display = 'none';
                alert("Koneksi API terputus.");
            }
        }

        function copyBubbleText(btnElement) {
            const textToCopy = btnElement.parentElement.querySelector('div').innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Isi teks bab tersebut berhasil disalin!");
            });
        }
    </script>
</body>
</html>
