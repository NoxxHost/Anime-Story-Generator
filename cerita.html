<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Cerita Anime AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --primary-color: #66fcf1;
            --secondary-color: #45f3ff;
            --accent-color: #ff007f;
            --text-color: #c5c6c7;
            --card-bg: #1f2833;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image: radial-gradient(circle at 50% 10%, rgba(102, 252, 241, 0.03) 0%, transparent 50%);
            min-height: 100vh;
        }

        .nav-container {
            max-width: 900px;
            margin: 20px auto 0;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
        }

        .btn-back {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .btn-back:hover { background: rgba(255,255,255,0.1); }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 15px 50px;
        }

        .result-box {
            background: rgba(31, 40, 51, 0.9);
            border-radius: 20px;
            padding: 25px;
            border-top: 4px solid var(--primary-color);
            box-shadow: 0 10px 50px rgba(0,0,0,0.6);
            animation: fadeInUp 0.8s ease-out;
        }
        @media (min-width: 768px) { .result-box { padding: 40px; } }

        .result-header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }
        @media (min-width: 600px) {
            .result-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .story-title { 
            color: #fff; 
            font-size: 1.5rem; 
            font-weight: 800;
            line-height: 1.3;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
        }

        .btn-copy {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-copy:hover { background: var(--primary-color); color: #000; }

        .story-display {
            line-height: 1.9;
            font-size: 1rem;
            white-space: pre-wrap;
            color: #e0e0e0;
            word-break: break-word;
            text-align: justify;
        }
        @media (min-width: 768px) { .story-display { font-size: 1.05rem; } }

        /* Style Otomatis untuk Judul Bab/Chapter */
        .chapter-heading {
            display: block;
            margin: 40px 0 20px;
            padding: 12px 15px;
            background: rgba(102, 252, 241, 0.08);
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            color: var(--secondary-color);
            font-weight: 700;
            font-size: 1.15rem;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Buat Cerita Baru</a>
    </div>

    <div class="container">
        <div class="result-box">
            <div class="result-header">
                <div class="story-title" id="displayTitle">Memuat Judul...</div>
                <button class="btn-copy" onclick="copyFullNovel()">
                    <i class="fa-solid fa-copy"></i> Salin Seluruh Cerita
                </button>
            </div>
            
            <div id="storyContent" class="story-display"></div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const rawStory = localStorage.getItem("generated_anime_story");
            const storyContent = document.getElementById('storyContent');
            const displayTitle = document.getElementById('displayTitle');

            if (!rawStory) {
                storyContent.innerHTML = "<p style='text-align:center;'>Belum ada cerita yang dibuat. Kembali ke Home.</p>";
                return;
            }

            let mainText = rawStory.trim();
            
            // Mengambil Judul Utama
            if (mainText.includes("JUDUL:")) {
                const lines = mainText.split("\n");
                const titleLine = lines.find(l => l.includes("JUDUL:"));
                const cleanedTitle = titleLine.replace("JUDUL:", "").replace(/[\[\]]/g, "").trim();
                displayTitle.innerText = cleanedTitle;
                mainText = mainText.replace(titleLine, "").trim();
            } else {
                displayTitle.innerText = "Mahakarya Novel Anime";
            }

            // Membuat Tampilan Penanda Bab Menjadi Cantik Otomatis
            // Mengganti penanda "=== CHAPTER X ===" dengan elemen Box khusus secara visual
            const chapterPattern = /===\s*CHAPTER\s*\d+[\s\S]*?===/gi;
            mainText = mainText.replace(chapterPattern, (match) => {
                const cleanChapterName = match.replace(/===/g, "").trim();
                return `</div><div class="chapter-heading"><i class="fa-solid fa-bookmark"></i> ${cleanChapterName}</div><div class="story-display">`;
            });

            storyContent.innerHTML = mainText;
        });

        function copyFullNovel() {
            const title = document.getElementById('displayTitle').innerText;
            const content = document.getElementById('storyContent').innerText;
            const fullText = `${title}\n\n${content}`;

            navigator.clipboard.writeText(fullText).then(() => {
                alert("Seluruh isi novel berhasil disalin ke clipboard!");
            }).catch(() => {
                // Cadangan salin manual jika browser bermasalah
                const textArea = document.createElement("textarea");
                textArea.value = fullText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert("Seluruh isi novel berhasil disalin!");
            });
        }
    </script>
</body>
</html>
